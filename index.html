const Particles=()=>{

    const pts=Array.from({length:50},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*1.5+0.5}));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,w,h);
      pts.forEach((p,i)=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0||p.x>w)p.vx*=-1;
        if(p.y<0||p.y>h)p.vy*=-1;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(88,166,255,0.12)";ctx.fill();
        pts.slice(i+1).forEach(q=>{
          const d=Math.hypot(p.x-q.x,p.y-q.y);
          if(d<120){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
          ctx.strokeStyle=`rgba(88,166,255,${0.05*(1-d/120)})`;ctx.stroke();}
        });
      });
      raf=requestAnimationFrame(draw);
    };
    draw();
    const resize=()=>{w=c.width=window.innerWidth;h=c.height=window.innerHeight;};
    window.addEventListener("resize",resize);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",resize);};
  },[]);
  return React.createElement("canvas",{ref,style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}});
};
